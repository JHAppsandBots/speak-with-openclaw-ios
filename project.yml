name: BotVoice
options:
  bundleIdPrefix: ai.openclaw
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "9YMCY74WN3"  # Xcode → Signing & Capabilities → Team

targets:
  BotVoice:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.johanneshahn.speakwithopenclaw
        INFOPLIST_FILE: Sources/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: "Speak with Claw"
        UILaunchScreen:
          UIColorName: ""
        NSMicrophoneUsageDescription: "Speak with Claw needs microphone access to record your voice messages and send them to your AI bot."
        NSSpeechRecognitionUsageDescription: "Speak with Claw uses speech recognition to detect your hotword and activate hands-free mode."
        UIBackgroundModes:
          - audio
          - fetch
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    dependencies: []
